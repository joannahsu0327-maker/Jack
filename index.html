<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>張博軒 專業名片 V1</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <script>
        const JACK_DATA = {
            LIFF_ID: "2009678095-bKSTnWIJ",
            BASE_URL: "https://joannahsu0327-maker.github.io/Jack/",
            IMG_MAIN: "JACK_IMAGE.jpg",
            IMG_INTRO: "DFP_IMAGE.jpg",
            name: "張博軒",
            title: "商業成長顧問 | 商業教育",
            intro: "幫企業從流量混亂 走向穩定成交",
            feature_Title: "服務項目", 
            item1: "📈 更穩定的客源方式",
            item2: "💰 提升成交率（不是靠感覺）",
            item3: "⚙️ 把現在做的事變成流程",
            item4: "🧠 看懂下一步怎麼走",
            item5: "🏠 地政代書協作諮詢",
            url_Booking: "https://line.me/ti/p/l3Vd7yYLtP",
            url_IG: "https://www.instagram.com/bboy_bigbear",           
            phone: "0956086826"
        };

        async function main() {
            try {
                await liff.init({ liffId: JACK_DATA.LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); return; }
                
                const ts = "?t=" + Date.now();
                const res = await liff.shareTargetPicker([{
                    "type": "flex", 
                    "altText": "您好，這是 " + JACK_DATA.name + " 的專業名片",
                    "contents": {
                        "type": "carousel",
                        "contents": [
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": JACK_DATA.BASE_URL + JACK_DATA.IMG_MAIN + ts, "size": "full", "aspectRatio": "3:4", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "text", "text": JACK_DATA.name, "weight": "bold", "size": "xl" }, 
                                    { "type": "text", "text": JACK_DATA.title, "size": "sm", "color": "#fb966e", "weight": "bold" } 
                                ] } 
                            },
                            { 
                                "type": "bubble", 
                                "hero": { "type": "image", "url": JACK_DATA.BASE_URL + JACK_DATA.IMG_INTRO + ts, "size": "full", "aspectRatio": "20:13", "aspectMode": "cover" }, 
                                "body": { "type": "box", "layout": "vertical", "spacing": "lg", "contents": [
                                    { "type": "text", "text": JACK_DATA.intro, "size": "xs", "color": "#888888", "wrap": true },
                                    { "type": "text", "text": JACK_DATA.feature_Title, "weight": "bold", "size": "lg", "color": "#fb966e" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "text", "text": JACK_DATA.item1, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": JACK_DATA.item2, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": JACK_DATA.item3, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": JACK_DATA.item4, "size": "md", "weight": "bold" },
                                        { "type": "text", "text": JACK_DATA.item5, "size": "md", "weight": "bold" }
                                    ]}
                                ]},
                                "footer": { "type": "box", "layout": "vertical", "contents": [ 
                                    { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "預約諮詢", "uri": JACK_DATA.url_Booking } } 
                                ] }
                            },
                            { 
                                "type": "bubble", 
                                "body": { "type": "box", "layout": "vertical", "spacing": "md", "contents": [
                                    { "type": "text", "text": "與我聯繫", "weight": "bold", "size": "lg" }, { "type": "separator" },
                                    { "type": "box", "layout": "vertical", "spacing": "sm", "contents": [
                                        { "type": "button", "style": "primary", "color": "#fb966e", "action": { "type": "uri", "label": "撥打電話", "uri": "tel:" + JACK_DATA.phone } },
                                        { "type": "button", "style": "secondary", "color": "#EEEEEE", "action": { "type": "uri", "label": "加 LINE 好友", "uri": JACK_DATA.url_Booking } },
                                        { "type": "button", "style": "secondary", "color": "#FEE8F0", "action": { "type": "uri", "label": "追蹤 Instagram", "uri": JACK_DATA.url_IG } },
                                        { "type": "button", "style": "link", "height": "sm", "action": { "type": "uri", "label": "📤 分享張博軒名片", "uri": "https://liff.line.me/" + JACK_DATA.LIFF_ID } }
                                    ]}
                                ]}
                            }
                        ]
                    }
                }]);

                if (res) {
                    liff.closeWindow();
                } else {
                    console.log("TargetPicker cancelled");
                }
            } catch (err) { 
                console.error(err);
                alert("啟動失敗，請檢查權限或網址設定");
            }
        }
        main();
    </script>
</body>
</html>
